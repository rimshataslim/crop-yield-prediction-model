<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Crop Yield Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,.55),
rgba(0,0,0,.55)),

url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;
background-attachment:fixed;

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:40px;

}

.container{

max-width:900px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:25px;

padding:40px;

box-shadow:0 15px 40px rgba(0,0,0,.3);

color:white;

}

.main-title{

font-size:40px;

font-weight:700;

text-align:center;

color:#90EE90;

margin-bottom:10px;

}

.subtitle{

text-align:center;

font-size:18px;

margin-bottom:30px;

color:#f5f5f5;

}

.form-control{

height:50px;

border-radius:12px;

border:none;

}

.form-control:focus{

box-shadow:0 0 12px #66ff99;

}

label{

font-weight:500;

margin-bottom:8px;

}

.input-group-text{

background:#2E8B57;

color:white;

border:none;

}

.btn-predict{

background:#2E8B57;

border:none;

width:100%;

padding:15px;

font-size:18px;

font-weight:600;

border-radius:15px;

transition:.3s;

}

.btn-predict:hover{

background:#3CB371;

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(0,0,0,.3);

}

.result{

margin-top:35px;

padding:25px;

border-radius:18px;

background:rgba(255,255,255,.18);

text-align:center;

}

.result h2{

color:#7CFC00;

font-weight:700;

}

.footer{

margin-top:20px;

text-align:center;

color:#ddd;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<h1 class="main-title">

🌾 Crop Yield Prediction

</h1>

<p class="subtitle">

Predict agricultural crop yield using Machine Learning

</p>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Year</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-calendar"></i>

</span>

<input type="number"

class="form-control"

name="Year"

required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Average Rainfall (mm)</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-cloud-rain"></i>

</span>

<input type="number"

step="any"

class="form-control"

name="average_rain_fall_mm_per_year"

required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Pesticides (Tonnes)</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-flask"></i>

</span>

<input type="number"

step="any"

class="form-control"

name="pesticides_tonnes"

required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Average Temperature (°C)</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-temperature-three-quarters"></i>

</span>

<input type="number"

step="any"

class="form-control"

name="avg_temp"

required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Country / Area</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-earth-americas"></i>

</span>

<input type="text"

class="form-control"

name="Area"

placeholder="India"

required>

</div>

</div>

<div class="col-md-6 mb-4">

<label>Crop Name</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-seedling"></i>

</span>

<input type="text"

class="form-control"

name="Item"

placeholder="Rice"

required>

</div>

</div>

</div>

<button class="btn btn-predict">

<i class="fa-solid fa-wheat-awn"></i>

Predict Crop Yield

</button>

</form>

{% if prediction %}

<div class="result">

<h4>Predicted Crop Yield</h4>

<h2>{{ prediction }}</h2>

<p>hg/ha (Hectograms per Hectare)</p>

</div>

{% endif %}

<div class="footer">

Developed using ❤️ Flask & Machine Learning

</div>

</div>

</body>

</html>
